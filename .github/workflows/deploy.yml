name: Deploy to Hostinger

on:
  push:
    branches: [ main ]
  workflow_dispatch:   # adds a manual "Run workflow" button in the Actions tab

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Deploy to Hostinger VPS
        uses: hostinger/deploy-on-vps@v2
        with:
          api-key: ${{ secrets.HOSTINGER_API_KEY }}
          virtual-machine: ${{ vars.HOSTINGER_VM_ID }}
          project-name: ppg-spot-finder
          docker-compose-path: compose.yaml
