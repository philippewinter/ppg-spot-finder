# PPG Spot Finder — deploy no Hostinger Docker Manager (Traefik em host network).
# O Traefik descobre este serviço pelos labels abaixo e publica em:
#   https://ppg.srv1742234.hstgr.cloud   (certificado Let's Encrypt automático)
#
# Atualizar o site: rode os scripts de build, faça commit e push — a GitHub
# Action reconstrói a imagem e redeploya.

services:
  ppg-spot-finder:
    build:
      context: .
      dockerfile: deploy/Dockerfile
    image: ppg-spot-finder:latest
    restart: unless-stopped
    expose:
      - "80"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.ppg-spot-finder.entrypoints=websecure"
      - "traefik.http.routers.ppg-spot-finder.rule=Host(`ppg.srv1742234.hstgr.cloud`)"
      - "traefik.http.routers.ppg-spot-finder.tls.certresolver=letsencrypt"
      - "traefik.http.services.ppg-spot-finder.loadbalancer.server.port=80"
