server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Compress the big inlined HTML (2.2 MB -> ~650 KB over the wire)
    gzip on;
    gzip_types text/html text/plain application/javascript text/css;
    gzip_min_length 1024;

    # The app rarely changes; let browsers cache it but revalidate
    location = /index.html {
        add_header Cache-Control "public, max-age=3600, must-revalidate";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
